<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chloe's Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- 상단 헤더 -->
  <header class="top-header">
    <div class="logo">✨ Chloe's Planner</div>
    <div class="date-badge" id="today-badge"></div>
  </header>

  <!-- 연간 카드 -->
  <div class="card annual-card">
    <div class="card-header">
      <span class="card-label">2026 Annual Goal</span>
      <button class="btn btn-edit-white" onclick="openAnnualModal()">편집</button>
    </div>
    <div class="annual-body">
      <div class="annual-ring" id="annual-ring"></div>
      <div class="annual-info">
        <div class="annual-goal-text" id="annual-goal"></div>
        <div class="core-actions" id="core-actions"></div>
      </div>
    </div>
  </div>

  <!-- 분기 카드 4개 -->
  <div class="quarterly-grid" id="quarterly-grid"></div>

  <!-- 월간 + 주간 -->
  <div class="two-col">

    <!-- 월간: 핵심목표 3개 서브 항목 -->
    <div class="card">
      <div class="card-header">
        <span class="card-label" id="month-label">이번달 목표</span>
        <button class="btn btn-edit" onclick="openMonthModal()">편집</button>
      </div>
      <div id="month-core-goals"></div>
    </div>

    <!-- 주간: 카테고리별 진행률 + 주차 이동 -->
    <div class="card">
      <div class="card-header">
        <span class="card-label">주간 목표</span>
        <button class="btn btn-edit" onclick="openWeekModal()">편집</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <button class="cal-nav" onclick="moveWeek(-1)">&#8249;</button>
        <div style="text-align:center">
          <div id="week-range-label" style="font-size:13px;font-weight:600;color:var(--text)"></div>
          <div id="week-current-badge"></div>
        </div>
        <button class="cal-nav" onclick="moveWeek(1)">&#8250;</button>
      </div>
      <div class="week-cats" id="week-cats"></div>
    </div>

  </div>

  <!-- 달력 -->
  <div class="card">
    <div class="cal-header">
      <span class="cal-title" id="cal-title"></span>
      <div class="cal-navs">
        <button class="cal-nav" onclick="moveMonth(-1)">&#8249;</button>
        <button class="cal-nav" onclick="moveMonth(1)">&#8250;</button>
      </div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

</div><!-- /.app -->

<!-- ===== 모달: 연간 편집 ===== -->
<div class="modal-overlay" id="modal-annual" style="display:none" onclick="closeIfOverlay(event,'modal-annual')">
  <div class="modal">
    <div class="modal-title">연간 목표 편집</div>
    <div class="form-group">
      <label class="form-label">목표</label>
      <textarea class="textarea" id="input-annual-goal" rows="2"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">핵심 액션 1</label>
      <input class="input" id="input-core1" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">핵심 액션 2</label>
      <input class="input" id="input-core2" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">핵심 액션 3</label>
      <input class="input" id="input-core3" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">달성률 &nbsp;<span class="slider-val" id="annual-pct-val">0%</span></label>
      <input class="slider" type="range" min="0" max="100" id="slider-annual"
             oninput="document.getElementById('annual-pct-val').textContent=this.value+'%'">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-annual')">취소</button>
      <button class="btn btn-primary" onclick="saveAnnualModal()">저장</button>
    </div>
  </div>
</div>

<!-- ===== 모달: 분기 편집 ===== -->
<div class="modal-overlay" id="modal-quarterly" style="display:none" onclick="closeIfOverlay(event,'modal-quarterly')">
  <div class="modal">
    <div class="modal-title" id="q-modal-title">분기 목표 편집</div>
    <input type="hidden" id="q-modal-key">
    <div class="form-group">
      <label class="form-label">목표</label>
      <input class="input" id="input-q-goal" type="text">
    </div>
    <div id="q-modal-progress-info" style="background:var(--bg);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;color:var(--muted);line-height:1.6"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-quarterly')">취소</button>
      <button class="btn btn-primary" onclick="saveQuarterlyModal()">저장</button>
    </div>
  </div>
</div>

<!-- ===== 모달: 월간 편집 (핵심목표 3개 동적 생성) ===== -->
<div class="modal-overlay" id="modal-monthly" style="display:none" onclick="closeIfOverlay(event,'modal-monthly')">
  <div class="modal">
    <div class="modal-title" id="month-modal-title">이번달 목표 편집</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5">
      연간 핵심목표 카테고리별로 이번달 목표를 입력하세요.<br>
      주간 할일에 핵심목표 태그를 달면 달성률이 자동 계산됩니다.
    </p>
    <div id="month-modal-form"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-monthly')">취소</button>
      <button class="btn btn-primary" onclick="saveMonthModal()">저장</button>
    </div>
  </div>
</div>

<!-- ===== 모달: 주간 편집 ===== -->
<div class="modal-overlay" id="modal-weekly" style="display:none" onclick="closeIfOverlay(event,'modal-weekly')">
  <div class="modal">
    <div class="modal-title">이번주 목표 편집</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5">
      할일을 추가할 때 <strong>핵심목표 카테고리</strong>를 선택하면<br>월간 달성률에 자동으로 반영됩니다.
    </p>
    <div class="week-tabs" id="week-modal-tabs"></div>
    <div id="week-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-weekly')">닫기</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="app.js"></script>
<script src="sync.js"></script>
<script>
var today       = new Date();
var todayKey    = dateKey(today);
var curMonthKey = monthKey(today);
var curWeekKey  = weekKey(today);  // 실제 이번주 (변하지 않음)
var viewWeekKey = curWeekKey;      // 현재 보고 있는 주 (이동 가능)
var curQ        = quarterNum(today);

var calYear  = today.getFullYear();
var calMonth = today.getMonth();

// 오늘 날짜 배지
document.getElementById('today-badge').textContent =
  today.getFullYear() + '년 ' + (today.getMonth()+1) + '월 ' + today.getDate() + '일 (' +
  ['일','월','화','수','목','금','토'][today.getDay()] + ')';

document.getElementById('month-label').textContent = (today.getMonth()+1) + '월 목표';

/* ===== 전체 렌더 ===== */
function renderAll() {
  renderAnnual();
  renderQuarterly();
  renderMonthly();
  renderWeekly();
  renderCalendar();
}

/* ===== 연간 ===== */
function renderAnnual() {
  var d = getAnnual();
  document.getElementById('annual-ring').innerHTML =
    svgRing(d.progress, 90, 'white', 'rgba(255,255,255,.25)');
  document.getElementById('annual-goal').textContent = d.goal;
  document.getElementById('core-actions').innerHTML = d.coreActions
    .filter(function(a){ return a.trim(); })
    .map(function(a, i){
      return '<span class="core-pill" style="background:rgba(255,255,255,.18)">' + escHtml(a) + '</span>';
    }).join('');
}

/* ===== 분기 (월간 데이터 기반 자동 달성률) ===== */
function renderQuarterly() {
  var d      = getQuarterly();
  var keys   = ['Q1','Q2','Q3','Q4'];
  var labels = ['1분기','2분기','3분기','4분기'];
  var colors = ['#6366f1','#8b5cf6','#06b6d4','#10b981'];
  var year   = today.getFullYear();
  document.getElementById('quarterly-grid').innerHTML = keys.map(function(k, i) {
    var q        = d[k];
    var isActive = (i + 1) === curQ;
    var pct      = calcQuarterProgress(i + 1, year);
    return '<div class="q-card' + (isActive ? ' active' : '') + '" onclick="openQuarterlyModal(\'' + k + '\')">'
      + '<div class="q-label">' + labels[i] + (isActive ? ' ◀ 현재' : '') + '</div>'
      + '<div class="q-ring">' + svgRing(pct, 68, colors[i], '#f0f4ff') + '</div>'
      + '<div class="q-goal">'
      + (q.goal || '<span style="color:#b0bec5;font-style:italic">목표 없음</span>')
      + '</div></div>';
  }).join('');
}

/* ===== 월간: 핵심목표 3개 서브 항목 ===== */
function renderMonthly() {
  var annual = getAnnual();
  var goals  = getMonthGoals(curMonthKey);
  var cores  = annual.coreActions.filter(function(a){ return a.trim(); });

  if (!cores.length) {
    document.getElementById('month-core-goals').innerHTML =
      '<p style="color:var(--muted);font-size:13px;font-style:italic">연간 핵심목표를 먼저 설정해주세요.</p>';
    return;
  }

  document.getElementById('month-core-goals').innerHTML = cores.map(function(a, i) {
    var color   = CORE_COLORS[i] || '#6366f1';
    var bgColor = color + '18';
    var goalTxt = goals.coreGoals[a] || '';
    var pct     = calcMonthCoreCategoryProgress(a, curMonthKey);
    return '<div class="core-goal-item">'
      + '<div class="core-goal-header">'
      + '<span class="core-goal-tag" style="background:' + bgColor + ';color:' + color + '">' + escHtml(a) + '</span>'
      + '<span class="core-goal-pct" style="color:' + color + '">' + pct + '%</span>'
      + '</div>'
      + (goalTxt
          ? '<div class="core-goal-text">' + escHtml(goalTxt) + '</div>'
          : '<div class="core-goal-text core-goal-empty">목표를 입력해주세요</div>')
      + '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>'
      + '</div>';
  }).join('');
}

/* ===== 주간 ===== */
function renderWeeklyNav() {
  document.getElementById('week-range-label').textContent = getWeekDateRange(viewWeekKey);
  var badge = document.getElementById('week-current-badge');
  if (viewWeekKey === curWeekKey) {
    badge.innerHTML = '<span style="font-size:11px;font-weight:600;color:var(--primary);'
      + 'background:var(--primary-light);padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block">이번주</span>';
  } else {
    badge.innerHTML = '';
  }
}

function renderWeekly() {
  renderWeeklyNav();
  document.getElementById('week-cats').innerHTML = WEEK_CATS.map(function(cat) {
    var counts = getDailyCountsForWeekCat(cat, viewWeekKey);
    var pct    = calcWeekCatProgressFromDaily(cat, viewWeekKey);
    var color  = WEEKCAT_COLORS[cat] || '#6366f1';
    var label  = counts.total ? counts.done + '/' + counts.total + ' 완료' : '할일 없음';
    return '<div class="week-cat-row">'
      + '<span class="week-cat-name">' + escHtml(cat) + '</span>'
      + '<div class="week-cat-bar"><div class="progress-bar-wrap">'
      + '<div class="progress-bar-fill" style="width:' + pct + '%;background:' + color + '"></div>'
      + '</div></div>'
      + '<span class="week-cat-count" style="color:' + (counts.total ? 'var(--muted)' : '#c8d0e0') + '">' + label + '</span>'
      + '</div>';
  }).join('');
}

function moveWeek(dir) {
  viewWeekKey = shiftWeekKey(viewWeekKey, dir);
  renderWeekly();
}

/* ===== 달력 ===== */
function renderCalendar() {
  var months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-title').textContent = calYear + '년 ' + months[calMonth];

  var firstDay    = new Date(calYear, calMonth, 1).getDay();
  var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  var prevDays    = new Date(calYear, calMonth, 0).getDate();
  var dows        = ['일','월','화','수','목','금','토'];

  var html = dows.map(function(d){ return '<div class="cal-dow">' + d + '</div>'; }).join('');

  for (var i = firstDay - 1; i >= 0; i--) {
    html += '<div class="cal-day other-month">' + (prevDays - i) + '</div>';
  }
  for (var d = 1; d <= daysInMonth; d++) {
    var dk      = calYear + '-' + pad(calMonth + 1) + '-' + pad(d);
    var isToday = (dk === todayKey);
    var hasData = hasDayData(dk);
    var cls     = 'cal-day' + (isToday ? ' today' : '') + (hasData ? ' has-data' : '');
    html += '<div class="' + cls + '" onclick="gotoDay(\'' + dk + '\')">' + d + '</div>';
  }
  var total     = firstDay + daysInMonth;
  var remainder = total % 7 ? 7 - (total % 7) : 0;
  for (var n = 1; n <= remainder; n++) {
    html += '<div class="cal-day other-month">' + n + '</div>';
  }
  document.getElementById('cal-grid').innerHTML = html;
}

function moveMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
}

function gotoDay(dk) { window.location.href = 'daily.html?date=' + dk; }

/* ===== 모달 유틸 ===== */
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function closeIfOverlay(e, id) { if (e.target === e.currentTarget) closeModal(id); }

/* ===== 연간 모달 ===== */
function openAnnualModal() {
  var d = getAnnual();
  document.getElementById('input-annual-goal').value = d.goal;
  document.getElementById('input-core1').value = d.coreActions[0] || '';
  document.getElementById('input-core2').value = d.coreActions[1] || '';
  document.getElementById('input-core3').value = d.coreActions[2] || '';
  document.getElementById('slider-annual').value = d.progress;
  document.getElementById('annual-pct-val').textContent = d.progress + '%';
  document.getElementById('modal-annual').style.display = 'flex';
}
function saveAnnualModal() {
  saveAnnual({
    goal: document.getElementById('input-annual-goal').value.trim(),
    coreActions: [
      document.getElementById('input-core1').value.trim(),
      document.getElementById('input-core2').value.trim(),
      document.getElementById('input-core3').value.trim(),
    ],
    progress: +document.getElementById('slider-annual').value
  });
  closeModal('modal-annual');
  renderAnnual();
  renderMonthly(); // 핵심목표 변경시 월간도 갱신
}

/* ===== 분기 모달 ===== */
function openQuarterlyModal(qKey) {
  var d      = getQuarterly();
  var labels = {Q1:'1분기',Q2:'2분기',Q3:'3분기',Q4:'4분기'};
  var qNums  = {Q1:1,Q2:2,Q3:3,Q4:4};
  var qNum   = qNums[qKey];
  var year   = today.getFullYear();
  var pct    = calcQuarterProgress(qNum, year);

  document.getElementById('q-modal-title').textContent = labels[qKey] + ' 목표 편집';
  document.getElementById('q-modal-key').value = qKey;
  document.getElementById('input-q-goal').value = d[qKey].goal;

  // 분기 내 월별 달성률 표시
  var startMonth = (qNum - 1) * 3 + 1;
  var monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var rows = '';
  for (var m = startMonth; m < startMonth + 3; m++) {
    var mk = year + '-' + pad(m);
    var mp = calcMonthTotalProgress(mk);
    rows += '<div style="display:flex;justify-content:space-between;padding:3px 0">'
      + '<span>' + monthNames[m-1] + '</span>'
      + '<span style="font-weight:600;color:var(--primary)">' + mp + '%</span>'
      + '</div>';
  }
  document.getElementById('q-modal-progress-info').innerHTML =
    '<div style="margin-bottom:6px;font-weight:600;color:var(--text)">📊 자동 달성률: ' + pct + '%</div>'
    + '<div style="font-size:12px;color:var(--muted);margin-bottom:8px">매일 할일 체크 기반으로 자동 계산됩니다</div>'
    + rows;

  document.getElementById('modal-quarterly').style.display = 'flex';
}
function saveQuarterlyModal() {
  var d = getQuarterly();
  var k = document.getElementById('q-modal-key').value;
  d[k] = { goal: document.getElementById('input-q-goal').value.trim(), progress: 0 };
  saveQuarterly(d);
  closeModal('modal-quarterly');
  renderQuarterly();
}

/* ===== 월간 모달 (핵심목표 동적 생성) ===== */
function openMonthModal() {
  var annual = getAnnual();
  var goals  = getMonthGoals(curMonthKey);
  var cores  = annual.coreActions.filter(function(a){ return a.trim(); });

  document.getElementById('month-modal-title').textContent =
    (today.getMonth() + 1) + '월 목표 편집';

  document.getElementById('month-modal-form').innerHTML = cores.map(function(a, i) {
    var color = CORE_COLORS[i] || '#6366f1';
    var val   = escHtml(goals.coreGoals[a] || '');
    return '<div class="form-group">'
      + '<label class="form-label" style="color:' + color + '">' + escHtml(a) + '</label>'
      + '<textarea class="textarea month-goal-input" data-core="' + escHtml(a) + '" rows="2" placeholder="' + escHtml(a) + ' 관련 이번달 목표...">' + val + '</textarea>'
      + '</div>';
  }).join('');

  document.getElementById('modal-monthly').style.display = 'flex';
}
function saveMonthModal() {
  var inputs = document.querySelectorAll('.month-goal-input');
  var coreGoals = {};
  inputs.forEach(function(el) {
    coreGoals[el.getAttribute('data-core')] = el.value.trim();
  });
  saveMonthGoals({ coreGoals: coreGoals }, curMonthKey);
  closeModal('modal-monthly');
  renderMonthly();
}

/* ===== 주간 모달 ===== */
var weekModalCat    = WEEK_CATS[0];
var editingWeekTaskId = null;

function openWeekModal() {
  weekModalCat = WEEK_CATS[0];
  // 모달 타이틀에 현재 보는 주차 표시
  var isNow = viewWeekKey === curWeekKey;
  document.querySelector('#modal-weekly .modal-title').textContent =
    isNow ? '이번주 목표 편집' : getWeekDateRange(viewWeekKey) + ' 주간 목표';
  renderWeekModalTabs();
  renderWeekModalBody();
  document.getElementById('modal-weekly').style.display = 'flex';
}

function renderWeekModalTabs() {
  document.getElementById('week-modal-tabs').innerHTML = WEEK_CATS.map(function(cat) {
    return '<div class="week-tab' + (cat === weekModalCat ? ' active' : '') + '" onclick="switchWeekTab(\'' + cat + '\')">'
      + escHtml(cat) + '</div>';
  }).join('');
}

function switchWeekTab(cat) {
  weekModalCat = cat;
  renderWeekModalTabs();
  renderWeekModalBody();
}

function renderWeekModalBody() {
  var data   = getWeekData(viewWeekKey);
  var tasks  = data[weekModalCat] || [];
  var annual = getAnnual();
  var cores  = annual.coreActions.filter(function(a){ return a.trim(); });

  var coreOptions = '<option value="">핵심목표 없음</option>'
    + cores.map(function(a){
        return '<option value="' + escHtml(a) + '">' + escHtml(a) + '</option>';
      }).join('');

  var taskHtml = tasks.map(function(t) {
    var coreIdx = cores.indexOf(t.coreCategory);
    var color   = coreIdx >= 0 ? CORE_COLORS[coreIdx] : null;
    var badge   = (t.coreCategory && color)
      ? '<span class="cat-badge" style="background:' + color + '18;color:' + color + '">' + escHtml(t.coreCategory) + '</span>'
      : '';

    if (t.id === editingWeekTaskId) {
      return '<div class="task-item">'
        + '<input type="checkbox" class="task-check"' + (t.done ? ' checked' : '') + ' onchange="toggleWeekTask(\'' + t.id + '\')">'
        + '<input class="task-edit-input" id="ew-' + t.id + '" value="' + escHtml(t.text) + '"'
        + ' onkeydown="if(event.key===\'Enter\')saveEditWeekTask(\'' + t.id + '\');if(event.key===\'Escape\'){editingWeekTaskId=null;renderWeekModalBody();}"'
        + ' onblur="saveEditWeekTask(\'' + t.id + '\')">'
        + badge
        + '<button class="btn-danger-sm" onclick="deleteWeekTask(\'' + t.id + '\')">×</button>'
        + '</div>';
    }
    return '<div class="task-item' + (t.done ? ' done' : '') + '">'
      + '<input type="checkbox" class="task-check"' + (t.done ? ' checked' : '') + ' onchange="toggleWeekTask(\'' + t.id + '\')">'
      + '<span class="task-text">' + escHtml(t.text) + '</span>'
      + badge
      + '<button class="btn-edit-sm" onclick="editingWeekTaskId=\'' + t.id + '\';renderWeekModalBody()">✏</button>'
      + '<button class="btn-danger-sm" onclick="deleteWeekTask(\'' + t.id + '\')">×</button>'
      + '</div>';
  }).join('');

  // 편집 중인 항목에 포커스
  setTimeout(function() {
    if (editingWeekTaskId) {
      var inp = document.getElementById('ew-' + editingWeekTaskId);
      if (inp) { inp.focus(); inp.select(); }
    }
  }, 0);

  document.getElementById('week-modal-body').innerHTML =
    '<div class="task-list">' + taskHtml + '</div>'
    + '<div class="add-row">'
    + '<select class="add-select" id="week-core-select">' + coreOptions + '</select>'
    + '<input class="add-input" id="week-add-input" type="text" placeholder="할 일 추가..."'
    + ' onkeydown="if(event.key===\'Enter\') addWeekTask()">'
    + '<button class="btn btn-primary btn-sm" onclick="addWeekTask()">추가</button>'
    + '</div>';
}

function addWeekTask() {
  var input = document.getElementById('week-add-input');
  var sel   = document.getElementById('week-core-select');
  var text  = input.value.trim();
  if (!text) return;
  var data = getWeekData(viewWeekKey);
  data[weekModalCat].push({ id: uid(), text: text, done: false, coreCategory: sel ? sel.value : '' });
  saveWeekData(viewWeekKey, data);
  input.value = '';
  renderWeekModalBody();
  renderWeekly();
  renderMonthly();
}

function toggleWeekTask(id) {
  var data  = getWeekData(viewWeekKey);
  var tasks = data[weekModalCat];
  for (var i = 0; i < tasks.length; i++) {
    if (tasks[i].id === id) { tasks[i].done = !tasks[i].done; break; }
  }
  saveWeekData(viewWeekKey, data);
  renderWeekModalBody();
  renderWeekly();
  renderMonthly();
}

function saveEditWeekTask(id) {
  if (editingWeekTaskId !== id) return;
  var inp = document.getElementById('ew-' + id);
  if (!inp) return;
  var newText = inp.value.trim();
  editingWeekTaskId = null;
  if (newText) {
    var data = getWeekData(viewWeekKey);
    data[weekModalCat].forEach(function(t){ if (t.id === id) t.text = newText; });
    saveWeekData(viewWeekKey, data);
  }
  renderWeekModalBody();
}

function deleteWeekTask(id) {
  var data = getWeekData(viewWeekKey);
  data[weekModalCat] = data[weekModalCat].filter(function(t){ return t.id !== id; });
  saveWeekData(viewWeekKey, data);
  renderWeekModalBody();
  renderWeekly();
  renderMonthly();
}

// 초기 렌더 (Firebase 동기화 후 실행)
initSync(renderAll);
</script>
</body>
</html>
